<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yang Jiahao Pages</title>
  <style>
    :root {
      --ink: #1f2933;
      --muted: #637083;
      --line: #d8e0ea;
      --paper: #ffffff;
      --bg: #edf2f7;
      --accent: #2c7a7b;
      --accent2: #4a6fa5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      line-height: 1.65;
    }
    .shell { max-width: 1080px; margin: 0 auto; padding: 42px 20px 64px; }
    header { margin-bottom: 28px; }
    h1 { margin: 0 0 10px; font-size: clamp(30px, 5vw, 48px); line-height: 1.12; color: #12355b; letter-spacing: 0; }
    .lead { margin: 0; max-width: 720px; color: var(--muted); font-size: 18px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 18px; margin-top: 28px; }
    .card {
      display: block;
      min-height: 190px;
      padding: 22px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: inherit;
      text-decoration: none;
      box-shadow: 0 10px 28px rgba(31, 41, 51, 0.08);
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 16px 34px rgba(31, 41, 51, 0.12); border-color: #b8c6d8; }
    .tag { display: inline-block; margin-bottom: 14px; padding: 3px 9px; border-radius: 999px; background: #e8f0fb; color: #2f5f8f; font-size: 13px; }
    h2 { margin: 0 0 10px; font-size: 22px; line-height: 1.28; color: #164e63; letter-spacing: 0; }
    .desc { margin: 0 0 18px; color: #52616f; }
    .open { color: var(--accent); font-weight: 700; }
    .meta { margin-top: 30px; color: #7b8794; font-size: 14px; }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <h1>学习资料导航</h1>
      <p class="lead">用于集中发布静态学习页面。以后新增页面时，可以继续按目录放入内容，并在这里添加入口。</p>
    </header>

    <section class="grid" aria-label="页面列表">
      <a class="card" href="algebra-book-2-chapter-8/">
        <span class="tag">代数 · 第2册</span>
        <h2>第八章学习汇总</h2>
        <p class="desc">一元二次方程和可以化成一元二次方程来解的方程。包含知识点、方法总结、精选习题和易错点。</p>
        <span class="open">打开学习版</span>
      </a>

      <a class="card" href="algebra-book-2-chapter-8/answers.html">
        <span class="tag">配套答案</span>
        <h2>第八章习题答案详解</h2>
        <p class="desc">对应精选练习题的答案与解题过程，适合完成练习后核对思路。</p>
        <span class="open">打开答案详解</span>
      </a>
    </section>

    <p class="meta">站点域名：website.yangjiahao.top</p>
  </main>
</body>
</html>
